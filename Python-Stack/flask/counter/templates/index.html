<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
  </head>
  <body>
    <p>Page visited <strong>{{ visits }}</strong> times</p>
    <h1>Counter</h1>
    <h5>{{count}} times</h5>
    <p><a href="/incrementByTwo">Increment Two</a></p>
    <p><a href="/reset">Reset</a></p>
    <form action="/byAmount" method="post">
      <input type="number" name="amount" required />
      <input type="submit" />
    </form>
  </body>
</html>
