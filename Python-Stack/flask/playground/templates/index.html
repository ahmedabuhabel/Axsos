<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground</title>
    <style>
      h1 {
        text-align: center;
      }
      .boxes {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      .box {
        width: 22%;
        height: 100px;

        background-color: {{ color }};
      }
    </style>
  </head>
  <body>
    <h1>Welcome!</h1>
    <div class="boxes">
      {% for i in range(count) %}
      <div class="box"></div>
      {% endfor %}
    </div>
  </body>
</html>
