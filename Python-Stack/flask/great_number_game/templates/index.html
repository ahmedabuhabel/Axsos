<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Counter Game</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <main>
      <h2>Welcome to the Great Number Game</h2>
      <h4>I am thinking a number between 1 and 100</h4>
      <p>Take a guess!</p>
      {% if session['res'] %}
      <div class="box" style="background-color: {{ session['color'] }};">
        <p>{{ session['res'] }}</p>
        {% if "was the number" in session['res'] %}
        <a href="/reset"><button>Play Again</button></a>

        {% endif %}
      </div>
      {% endif %}
      <form action="/guess" method="post">
        <input type="text" name="guess" required />
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
