<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amadon Checkout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div
      class="container bg-white p-5 rounded shadow shadow-sm text-center"
      style="max-width: 600px"
    >
      <h3 class="text-success fw-bold mb-4">Thank you for your business!</h3>

      <p class="fs-5">
        We charged your credit card for
        <strong class="text-danger"
          >${{ last_charge|stringformat:".2f" }}</strong
        >
      </p>

      <div class="alert alert-info py-3 my-4 text-start">
        <p class="mb-2">
          You have ordered <strong>{{ total_items }}</strong> items so far.
        </p>
        <p class="mb-0">
          And spent
          <strong class="text-dark"
            >${{ total_spent|stringformat:".2f" }}</strong
          >
          with Amadon.com!
        </p>
      </div>

      <p><a href="/" class="btn btn-outline-primary px-4">Go Back</a></p>
    </div>
  </body>
</html>
