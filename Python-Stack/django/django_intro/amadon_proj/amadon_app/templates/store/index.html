<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amadon Store</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div
      class="container bg-white p-5 rounded shadow-sm"
      style="max-width: 900px"
    >
      <h1 class="fw-bold mb-4 text-primary">Amadon Store!</h1>
      <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for product in all_products %}
          <tr>
            <form action="/amadon/buy" method="post" class="d-inline">
              {% csrf_token %}
              <input type="hidden" name="product_id" value="{{product.id}}" />

              <td class="fw-bold">{{product.description}}</td>
              <td class="text-success fw-semibold">${{product.price}}</td>
              <td>
                <select
                  name="quantity"
                  class="form-select form-select-sm"
                  style="width: 80px"
                >
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                </select>
              </td>
              <td>
                <button
                  type="submit"
                  class="btn btn-sm btn-warning fw-bold px-3"
                >
                  Buy!
                </button>
              </td>
            </form>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
