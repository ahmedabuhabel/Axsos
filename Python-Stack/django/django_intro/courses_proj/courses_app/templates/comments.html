<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Course Comments</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div
      class="container bg-white p-5 rounded shadow-sm"
      style="max-width: 700px"
    >
      <a href="/" class="btn btn-sm btn-secondary mb-3"><- Back to Courses</a>
      <h2 class="fw-bold mb-1">Comments for: {{ course.name }}</h2>
      <p class="text-muted mb-4">{{ course.description.content }}</p>

      <form
        action="/courses/{{ course.id }}/comments"
        method="POST"
        class="mb-4"
      >
        {% csrf_token %}
        <div class="input-group">
          <input
            type="text"
            name="comment"
            class="form-control"
            placeholder="Write a comment..."
            required
          />
          <button class="btn btn-primary" type="submit">Submit</button>
        </div>
      </form>

      <h4 class="fw-bold mb-3">All Comments:</h4>
      <ul class="list-group">
        {% for comment in comments %}
        <li
          class="list-group-item d-flex justify-content-between align-items-start"
        >
          <div class="ms-2 me-auto">{{ comment.content }}</div>
          <span class="badge bg-secondary rounded-pill"
            >{{ comment.created_at|date:"M d, Y" }}</span
          >
        </li>
        {% empty %}
        <li class="list-group-item text-muted text-center">
          No comments posted yet.
        </li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
