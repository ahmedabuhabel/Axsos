<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ book.title }} Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div
      class="container bg-white p-5 rounded shadow-sm"
      style="max-width: 700px"
    >
      <h1 class="fw-bold mb-2 text-primary">{{ book.title }}</h1>
      <p class="text-muted mb-2"><strong>ID:</strong> {{ book.id }}</p>
      <p class="mb-4"><strong>Description:</strong> {{ book.desc }}</p>

      <hr />

      <h3 class="fw-bold mb-3">Authors</h3>
      <ul class="list-group mb-4">
        {% for author in book.authors.all %}
        <li class="list-group-item">
          {{ author.first_name }} {{ author.last_name }}
        </li>
        {% empty %}
        <li class="list-group-item text-muted text-italic">
          No authors assigned to this book yet.
        </li>
        {% endfor %}
      </ul>

      <form
        action="/books/{{ book.id }}/add_author"
        method="POST"
        class="row g-2"
      >
        {% csrf_token %}
        <div class="col-sm-8">
          <select name="author_id" class="form-select" required>
            <option value="" selected disabled>Select an Author</option>
            {% for author in available_authors %}
            <option value="{{ author.id }}">
              {{ author.first_name }} {{ author.last_name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-4">
          <button type="submit" class="btn btn-dark w-100">Add</button>
        </div>
      </form>

      <a href="/books" class="btn btn-outline-secondary mt-4"
        >Back to Books List</a
      >
    </div>
  </body>
</html>
