<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ author.first_name }} Details</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div
      class="container bg-white p-5 rounded shadow-sm"
      style="max-width: 700px"
    >
      <h1 class="fw-bold mb-2 text-success">
        {{ author.first_name }} {{ author.last_name }}
      </h1>
      <p class="text-muted mb-2"><strong>ID:</strong> {{ author.id }}</p>
      <p class="mb-4"><strong>Notes:</strong> {{ author.notes }}</p>

      <hr />

      <h3 class="fw-bold mb-3">Books</h3>
      <ul class="list-group mb-4">
        {% for book in author.books.all %}
        <li class="list-group-item">{{ book.title }}</li>
        {% empty %}
        <li class="list-group-item text-muted text-italic">
          This author hasn't written any books yet.
        </li>
        {% endfor %}
      </ul>

      <form
        action="/authors/{{ author.id }}/add_book"
        method="POST"
        class="row g-2"
      >
        {% csrf_token %}
        <div class="col-sm-8">
          <select name="book_id" class="form-select" required>
            <option value="" selected disabled>Select a Book</option>
            {% for book in available_books %}
            <option value="{{ book.id }}">{{ book.title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-4">
          <button type="submit" class="btn btn-dark w-100">Add</button>
        </div>
      </form>

      <a href="/authors" class="btn btn-outline-secondary mt-4"
        >Back to Authors List</a
      >
    </div>
  </body>
</html>
