<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Books Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow-sm">
      <div class="row g-5">
        <div class="col-md-4 border-end">
          <h2 class="fw-bold mb-4">Add a Book</h2>
          <form action="/create_book" method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Title</label
              ><input type="text" name="title" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label
              ><textarea
                name="description"
                class="form-control"
                rows="3"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn btn-dark w-100 shadow-sm">
              Add
            </button>
          </form>
          <a href="/authors" class="btn btn-link mt-3 w-100"
            >Go to Authors Dashboard</a
          >
        </div>
        <div class="col-md-8">
          <h2 class="fw-bold mb-4">Books List</h2>
          <table class="table table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              {% for book in all_books %}
              <tr>
                <td>{{ book.id }}</td>
                <td>{{ book.title }}</td>
                <td>
                  <a
                    href="/books/{{ book.id }}"
                    class="btn btn-primary btn-sm px-3"
                    >View</a
                  >
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
