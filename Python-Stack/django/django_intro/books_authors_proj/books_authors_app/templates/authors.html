<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Authors Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow-sm">
      <div class="row g-5">
        <div class="col-md-4 border-end">
          <h2 class="fw-bold mb-4">Add an Author</h2>
          <form action="/create_author" method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">First Name</label
              ><input
                type="text"
                name="first_name"
                class="form-control"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Last Name</label
              ><input
                type="text"
                name="last_name"
                class="form-control"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Notes</label
              ><textarea
                name="notes"
                class="form-control"
                rows="3"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn btn-dark w-100 shadow-sm">
              Add
            </button>
          </form>
          <a href="/books" class="btn btn-link mt-3 w-100"
            >Go to Books Dashboard</a
          >
        </div>
        <div class="col-md-8">
          <h2 class="fw-bold mb-4">Authors List</h2>
          <table class="table table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              {% for author in all_authors %}
              <tr>
                <td>{{ author.id }}</td>
                <td>{{ author.first_name }} {{ author.last_name }}</td>
                <td>
                  <a
                    href="/authors/{{ author.id }}"
                    class="btn btn-primary btn-sm px-3"
                    >View</a
                  >
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
