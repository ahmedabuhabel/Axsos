<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C+R Users</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .main-container {
        max-width: 900px;
        margin-top: 50px;
        background: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container main-container">
      <h2 class="text-center mb-4 text-secondary fw-bold">All the Users</h2>

      <div class="table-responsive mb-5">
        <table
          class="table table-striped table-bordered table-hover align-middle"
        >
          <thead class="table-dark">
            <tr>
              <th scope="col" style="width: 8%">ID</th>
              <th scope="col">Name</th>
              <th scope="col">Email</th>
              <th scope="col" style="width: 12%">Age</th>
            </tr>
          </thead>
          <tbody>
            {% for user in users %}
            <tr>
              <td>{{ user.id }}</td>
              <td>{{ user.first_name }} {{ user.last_name }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.age }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="4" class="text-center text-muted">
                No users found in the database.
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <hr class="my-5" style="border-top: 3px solid #6c757d; opacity: 0.5" />

      <h2 class="text-center mb-4 text-secondary fw-bold">Add a User</h2>

      <form action="/create" method="POST">
        {% csrf_token %}
        <div class="row g-4">
          <div class="col-md-6">
            <div class="row align-items-center">
              <label class="col-sm-3 col-form-label fw-bold text-md-end"
                >First Name</label
              >
              <div class="col-sm-9">
                <input
                  type="text"
                  name="first_name"
                  class="form-control"
                  required
                />
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="row align-items-center">
              <label class="col-sm-3 col-form-label fw-bold text-md-end"
                >Last Name</label
              >
              <div class="col-sm-9">
                <input
                  type="text"
                  name="last_name"
                  class="form-control"
                  required
                />
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="row align-items-center">
              <label class="col-sm-3 col-form-label fw-bold text-md-end"
                >Email</label
              >
              <div class="col-sm-9">
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  required
                />
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="row align-items-center">
              <label class="col-sm-3 col-form-label fw-bold text-md-end"
                >Age</label
              >
              <div class="col-sm-9">
                <input type="number" name="age" class="form-control" required />
              </div>
            </div>
          </div>
        </div>

        <div class="text-center mt-5">
          <button type="submit" class="btn btn-primary px-5 btn-lg shadow-sm">
            Add
          </button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
