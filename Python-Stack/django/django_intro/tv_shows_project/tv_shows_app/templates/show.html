<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Shows</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light py-5">
    <a href="/shows" class="btn btn-primary m-3">Go Back</a>

    <div class="container bg-white p-4 rounded shadow-sm">
      <h1 class="fw-bold text-dark mb-4 border-bottom pb-2">
        Tv Show {{show.id}}
      </h1>
      <div class="row">
        <div class="col">
          <p class="fs-5"><span class="fw-bold">Title:</span> {{show.title}}</p>
          <p class="fs-5">
            <span class="fw-bold">Network:</span> {{show.network}}
          </p>
          <p class="fs-5">
            <span class="fw-bold">Release Date:</span> {{show.release_date}}
          </p>
          <p class="fs-5">
            <span class="fw-bold">Description:</span> {{show.description}}
          </p>
        </div>
      </div>
      <a href="/shows/{{ show.id }}/edit" class="btn btn-primary">Edit</a>
      <a href="/shows/{{ show.id }}/delete" class="btn btn-danger">Delete</a>
    </div>
  </body>
</html>
