<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Edit a Show</title>
  </head>
  <body class="bg-light py-5">
    <div
      class="container bg-white p-5 rounded shadow-sm"
      style="max-width: 600px"
    >
      <h1 class="fw-bold text-dark mb-4 border-bottom pb-2">Edit a new Show</h1>
      <form action="/shows/{{show.id}}/update" method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input
            type="text"
            class="form-control"
            id="title"
            name="title"
            value="{{old_title}}"
          />
        </div>
        <div class="mb-3">
          <label for="network" class="form-label">Network</label>
          <input
            type="text"
            class="form-control"
            id="network"
            name="network"
            value="{{old_network}}"
          />
        </div>
        <div class="mb-3">
          <label for="release_date" class="form-label">Release Date</label>
          <input
            type="date"
            class="form-control"
            id="release_date"
            name="release_date"
            value="{{old_date}}"
          />
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea
            class="form-control"
            id="description"
            name="description"
            rows="3"
          >
{{old_desc}}</textarea
          >
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
      <br />
      <a href="/shows/{{ show.id }}" class="btn btn-success">Go to Show</a>
      {% if messages %}
      <ul>
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}
    </div>
  </body>
</html>
