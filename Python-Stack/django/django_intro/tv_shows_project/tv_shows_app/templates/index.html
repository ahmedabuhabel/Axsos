<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Shows</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light py-5">
    <div class="container bg-white p-4 rounded shadow-sm">
      <h1 class="fw-bold text-dark mb-4 border-bottom pb-2">All Shows</h1>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th scope="col">Title</th>
              <th scope="col">Network</th>
              <th scope="col">Release Date</th>
              <th scope="col">Description</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for show in all_shows %}
            <tr>
              <td class="fw-semibold text-primary">{{ show.title }}</td>
              <td>
                <span class="badge bg-secondary px-2 py-1"
                  >{{ show.network }}</span
                >
              </td>
              <td class="text-muted">{{ show.release_date }}</td>
              <td>{{ show.description }}</td>
              <td>
                <a href="/shows/{{ show.id }}/edit" class="btn btn-primary"
                  >Edit</a
                >
                <a href="/shows/{{ show.id }}/delete" class="btn btn-danger"
                  >Delete</a
                >
                <a href="/shows/{{ show.id }}" class="btn btn-success">View</a>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>

        <a href="/shows/new" class="btn btn-primary">Add Show</a>
      </div>
    </div>
  </body>
</html>
