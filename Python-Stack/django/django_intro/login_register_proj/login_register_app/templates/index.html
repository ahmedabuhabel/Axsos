<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light py-5">
    <div
      class="container bg-white p-5 rounded shadow-sm"
      style="max-width: 1000px"
    >
      {% if messages %}
      <div class="row">
        <div class="col-12">
          {% for message in messages %}
          <div
            class="alert alert-danger alert-dismissible fade show shadow-sm"
            role="alert"
          >
            {{ message }}
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
              aria-label="Close"
            ></button>
          </div>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      <div class="row g-5">
        <div class="col-md-6 border-end">
          <h2 class="fw-bold text-dark mb-4 pb-2 border-bottom">
            Registration
          </h2>
          <form action="/register" method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label for="first_name" class="form-label">First Name</label>
              <input
                type="text"
                class="form-control"
                id="first_name"
                name="first_name"
                value="{{ reg_first_name }}"
              />
            </div>

            <div class="mb-3">
              <label for="last_name" class="form-label">Last Name</label>
              <input
                type="text"
                class="form-control"
                id="last_name"
                name="last_name"
                value="{{ reg_last_name }}"
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                value="{{ reg_email }}"
              />
            </div>

            <div class="mb-3">
              <label for="birthday" class="form-label">Birthday</label>
              <input
                type="date"
                class="form-control"
                id="birthday"
                name="birthday"
                value="{{ reg_birthday }}"
              />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                required
              />
            </div>

            <div class="mb-4">
              <label for="confirm_password" class="form-label"
                >Confirm PW</label
              >
              <input
                type="password"
                class="form-control"
                id="confirm_password"
                name="confirm_password"
                required
              />
            </div>

            <button
              type="submit"
              class="btn btn-primary px-4 fw-semibold shadow-sm"
            >
              Register
            </button>
          </form>
        </div>

        <div class="col-md-6 d-flex flex-column justify-content-start">
          <h2 class="fw-bold text-dark mb-4 pb-2 border-bottom">Login</h2>
          <form action="/login" method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label for="login_email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="login_email"
                name="email"
                value="{{ login_email }}"
              />
            </div>

            <div class="mb-4">
              <label for="login_password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="login_password"
                name="password"
                required
              />
            </div>

            <button
              type="submit"
              class="btn btn-success px-4 fw-semibold shadow-sm"
            >
              Log In
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
