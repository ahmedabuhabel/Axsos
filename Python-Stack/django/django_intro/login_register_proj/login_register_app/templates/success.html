<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div
        class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4"
      >
        <h1 class="text-success fw-bold">
          Success! Welcome, {{ current_user.first_name }}!
        </h1>
        <a href="/logout" class="btn btn-danger btn-sm shadow-sm">Log Out</a>
      </div>
      <div class="alert alert-success shadow-sm" role="alert">
        Successfully registered (or logged in)!
      </div>
    </div>
  </body>
</html>
